ensembl:
  name: Ensembl Assembly 235.v63
  extract: false
  url: 
    - https://ftp.ebi.ac.uk/ensemblgenomes/pub/metazoa/current/gtf/caenorhabditis_elegans/Caenorhabditis_elegans.WBcel235.63.gtf.gz

epd:
  name: Eukaryotic Promoter Database
  compress: gzip
  url: https://epd.expasy.org/ftp/epdnew/C_elegans/current/Ce_EPDnew.bed

gaf:
  name: GO Annotation File (GAF) from GO (WormBase-wb)
  extract: false
  url: http://current.geneontology.org/annotations/wb.gaf.gz

reactome:
  name: Reactome
  url:
    - https://reactome.org/download/current/ReactomePathways.txt
    - https://reactome.org/download/current/ReactomePathwaysRelation.txt
    - https://reactome.org/download/current/Ensembl2Reactome_All_Levels.txt
    - https://reactome.org/download/current/Ensembl2ReactomeReactions.txt
    - https://reactome.org/download/current/ReactionPMIDS.txt
    - https://reactome.org/download/current/ChEBI2Reactome_All_Levels.txt
    - https://reactome.org/download/current/ChEBI2ReactomeReactions.txt
    - https://reactome.org/download/current/interactors/reactome.all_species.interactions.tab-delimited.txt

rna_central:
  name: RNA Central
  extract: false
  url:
    - https://ftp.ebi.ac.uk/pub/databases/RNAcentral/current_release/genome_coordinates/bed/caenorhabditis_elegans.WBcel235.bed.gz
    - https://ftp.ebi.ac.uk/pub/databases/RNAcentral/current_release/go_annotations/rnacentral_rfam_annotations.tsv.gz

string:
  name: STRING PPI
  extract: false
  url:
    - https://stringdb-downloads.org/download/protein.links.v12.0/6239.protein.links.v12.0.txt.gz
    - https://stringdb-downloads.org/download/protein.links.detailed.v12.0/6239.protein.links.detailed.v12.0.txt.gz  # detailed version


tflink:
  name: TFLink
  version: {strategy: url_regex, pattern: '_(v[\d.]+)\.tsv', vtype: semver}
  compress: gzip
  url: https://cdn.netbiol.org/tflink/download_files/TFLink_Caenorhabditis_elegans_interactions_All_simpleFormat_v1.0.tsv


uniprot:
  name: UniProtKB/Swiss-Prot
  extract: false
  url: https://ftp.uniprot.org/pub/databases/uniprot/current_release/knowledgebase/taxonomic_divisions/uniprot_sprot_invertebrates.dat.gz

