---
abc:
  name: Activity-By-Contact (ABC)
  version: {strategy: url_regex, pattern: '/abc/(v[\d.]+)/', vtype: semver}
  extract: false
  url: https://forgedb.cancer.gov/api/abc/v1.0/abc.forgedb.csv.gz

alliance:
  name: agr - alliance of genome resource
  version: {strategy: url_regex, pattern: 'alliancegenome\.org/(\d+\.\d+\.\d+)/', vtype: semver}
  extract: false
  url:
    - https://fms.alliancegenome.org/download/DISEASE-ALLIANCE_COMBINED.tsv.gz  # gene to disease
    - https://download.alliancegenome.org/8.3.0/EXPRESSION-ALLIANCE/COMBINED/EXPRESSION-ALLIANCE_COMBINED_6.tsv.gz  # gene to expression location (ontologies like GO, FBbt, etc) NO HUMAN DATA
    - https://download.alliancegenome.org/8.3.0/INTERACTION-MOL/COMBINED/INTERACTION-MOL_COMBINED_5.tsv.gz          # Format is like that processed by dmel.dmel_physical_interaction_psimi_adapter
    - https://download.alliancegenome.org/8.3.0/ORTHOLOGY-ALLIANCE/COMBINED/ORTHOLOGY-ALLIANCE_COMBINED_7.tsv.gz    

bgee:
  name: Bgee Expression Data
  extract: false
  # url: https://bgee.org/ftp/current/download/calls/expr_calls/Homo_sapiens_expr_simple_development.tsv.gz
  url: https://www.bgee.org/ftp/current/download/calls/expr_calls/Homo_sapiens_expr_simple_all_conditions.tsv.gz

cadd:
  name: Combined Annotation Dependent Depletion (CADD)
  version: {strategy: url_regex, pattern: '/cadd/(v[\d.]+)/', vtype: semver}
  extract: false
  url: https://forgedb.cancer.gov/api/cadd/v1.0/cadd.forgedb.csv.gz

catlas:
  name: CATLAS Single-Cell Chromatin Accessibility Atlas (v1, hg38)
  version: {strategy: url_regex, pattern: 'catlas(v\d+)', vtype: sequential}
  url:
    cCRE_hg38.tsv.gz: https://decoder-genetics.wustl.edu/catlasv1/humanenhancer/data/cCRE_hg38.tsv.gz
    Cell_ontology.tsv: https://decoder-genetics.wustl.edu/catlasv1/humanenhancer/data/Cell_ontology.tsv
  directories:
    cCREs: https://decoder-genetics.wustl.edu/catlasv1/humanenhancer/data/cCREs/
    ABC_scores: https://decoder-genetics.wustl.edu/catlasv1/humanenhancer/data/ABC_scores/

cCRE:
  name: Screen candidate Cis-Regulatory Region
  compress: gzip
  url:
    - https://downloads.wenglab.org/GRCh38-Closest-Genes-PC.tsv
    - https://downloads.wenglab.org/GRCh38-Closest-Genes-All.tsv
  zip_extract:
    - url: https://downloads.wenglab.org/Human-Gene-Links.zip
      files:
        - V4-hg38.Gene-Links.eQTLs.txt

coxpresdb:
  name: Coxpress DB
  version: {strategy: url_regex, pattern: '\.(v[\d-]+)\.', vtype: other}
  extract: true
  url: https://zenodo.org/record/6861444/files/Hsa-u.v22-05.G16651-S245698.combat_pca.subagging.z.d.zip

dbsnp:
  name: dbSNP
  version: {strategy: url_regex, pattern: '_(b\d+)_', vtype: sequential}
  checksum: false   # multi-GB VCFs — skip sha256 (HEAD metadata + version still recorded)
  extract: false
  url:
    - https://ftp.ncbi.nih.gov/snp/organisms/human_9606_b151_GRCh38p7/VCF/00-All.vcf.gz
    - https://ftp.ncbi.nih.gov/snp/organisms/human_9606_b151_GRCh38p7/VCF/00-common_all.vcf.gz

dbsuper:
  name: dbsuper
  compress: gzip
  # url: http://asntech.org/dbsuper/data/dbSUPER_v1_GRCh38.bed.gz       #  no  such file
  url: https://asntech.org/dbsuper/data/dbSUPER_SuperEnhancers_hg19.tsv

dbvar:
  name: NCBI dbVar
  extract: false
  url: https://ftp.ncbi.nlm.nih.gov/pub/dbVar/data/Homo_sapiens/by_assembly/GRCh38/vcf/GRCh38.variant_call.all.vcf.gz

dgv:
  name: Database of Genomic Variants
  version: {strategy: url_regex, pattern: 'variants_(\d{4}-\d{2}-\d{2})', vtype: date}
  compress: gzip
  # url: http://dgv.tcag.ca/dgv/docs/GRCh38_hg38_variants_2020-02-25.txt        # adapters use gzipped version.
  url: https://dgv.tcag.ca/dgv/docs/GRCh38_hg38_variants_2025-12-01.txt

