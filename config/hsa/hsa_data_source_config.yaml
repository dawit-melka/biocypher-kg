epd:
  name: Eukaryotic Promoter Database
  compress: gzip
  url: https://epd.expasy.org/ftp/epdnew/H_sapiens/current/Hs_EPDnew.bed        # adapters use gzipped version.

gaf:
  name: GO Annotation File (GAF)
  extract: false
  url: http://geneontology.org/gene-associations/goa_human.gaf.gz

gencode:            # About the file to be downloaded:	"It contains the comprehensive gene annotation on the reference chromosomes only"
  name: GENCODE v49
  version: {strategy: url_regex, pattern: 'gencode\.(v\d+)\.', vtype: sequential}
  source_url: https://www.gencodegenes.org/
  extract: false
  url: https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_human/latest_release/gencode.v49.annotation.gtf.gz

gtex_eqtl:
  name: GTEx eQTL
  version: {strategy: url_regex, pattern: 'GTEx_Analysis_(v\d+)', vtype: sequential}
  # bucket: adult-gtex
  # path: bulk-qtl/v8/single-tissue-cis-qtl/GTEx_Analysis_v8_eQTL.tar
  url: https://storage.googleapis.com/adult-gtex/bulk-qtl/v10/single-tissue-cis-qtl/GTEx_Analysis_v10_eQTL.tar

gwas:
  name: GWAS Catalog
  url: 
    - https://ftp.ebi.ac.uk/pub/databases/gwas/releases/latest/gwas-catalog-associations-full.zip
    # - https://ftp.ebi.ac.uk/pub/databases/gwas/releases/2025/09/30/gwas-catalog-associations_ontology-annotated.tsv

hocomoco:
  name: HOCOMOCOv11
  version: {strategy: static, value: v11}
  extract_tar: true
  url:
    annotation: https://hocomoco11.autosome.org/final_bundle/hocomoco11/core/HUMAN/mono/HOCOMOCOv11_core_annotation_HUMAN_mono.tsv
    pwm: https://hocomoco11.autosome.org/final_bundle/hocomoco11/core/HUMAN/mono/HOCOMOCOv11_core_pwm_HUMAN_mono.tar.gz

hpo:
  name: Human Phenotype Ontology Phenotype and disease associations
  version: {strategy: url_regex, pattern: 'releases/download/v(\d{4}-\d{2}-\d{2})/', vtype: date}
  url:
  - https://github.com/obophenotype/human-phenotype-ontology/releases/download/v2025-11-24/genes_to_disease.txt
  - https://github.com/obophenotype/human-phenotype-ontology/releases/download/v2025-11-24/genes_to_phenotype.txt

polyphen2:
  name: PolyPhen-2
  version: {strategy: url_regex, pattern: 'polyphen-([\d.]+)-whess', vtype: semver}
  extract: true
  url: https://genetics.bwh.harvard.edu/downloads/pph2/whess/polyphen-2.2.2-whess-2011_12.tab.gz

reactome:
  name: Reactome
  url:
    - https://reactome.org/download/current/ReactomePathways.txt
    - https://reactome.org/download/current/ReactomePathwaysRelation.txt
    - https://reactome.org/download/current/Ensembl2Reactome_All_Levels.txt
    - https://reactome.org/download/current/Ensembl2ReactomeReactions.txt
    - https://reactome.org/download/current/ReactionPMIDS.txt
    - https://reactome.org/download/current/ChEBI2Reactome_All_Levels.txt
    - https://reactome.org/download/current/ChEBI2ReactomeReactions.txt
    - https://reactome.org/download/current/Pathways2GoTerms_human.txt
    - https://reactome.org/download/current/Reactions2GoTerms_human.txt
    - https://reactome.org/download/current/interactors/reactome.all_species.interactions.tab-delimited.txt

refseq:
  name: RefSeq Closest Gene
  version: {strategy: url_regex, pattern: '/closest_gene/(v[\d.]+)/', vtype: semver}
  extract: false
  url: https://forgedb.cancer.gov/api/closest_gene/v1.0/closest_gene.forgedb.csv.gz

rna_central:
  name: RNA Central
  extract: false
  url:
    homo_sapiens.GRCh38.bed.gz: https://ftp.ebi.ac.uk/pub/databases/RNAcentral/current_release/genome_coordinates/bed/homo_sapiens.GRCh38.bed.gz
    rnacentral_rfam_annotations.tsv.gz: https://ftp.ebi.ac.uk/pub/databases/RNAcentral/current_release/go_annotations/rnacentral_rfam_annotations.tsv.gz

