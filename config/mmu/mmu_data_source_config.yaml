# ---
alliance:
  name: Alliance of Genome Resources
  version: {strategy: url_regex, pattern: 'alliancegenome\.org/(\d+\.\d+\.\d+)/', vtype: semver}
  extract: false
  url:
    - https://fms.alliancegenome.org/download/DISEASE-ALLIANCE_COMBINED.tsv.gz  # gene to disease
    - https://download.alliancegenome.org/8.3.0/EXPRESSION-ALLIANCE/COMBINED/EXPRESSION-ALLIANCE_COMBINED_6.tsv.gz  # gene to expression location (ontologies like GO, FBbt, etc) NO HUMAN DATA
    - https://download.alliancegenome.org/8.3.0/INTERACTION-MOL/COMBINED/INTERACTION-MOL_COMBINED_5.tsv.gz          # Format is like that processed by dmel.dmel_physical_interaction_psimi_adapter
    - https://fms.alliancegenome.org/download/ORTHOLOGY-ALLIANCE_COMBINED.tsv.gz
    - https://fms.alliancegenome.org/download/VCF_GRCm39.vcf.gz 
    - https://fms.alliancegenome.org/download/VARIANT-ALLELE_NCBITaxon10090.tsv.gz    # look at EVA  VCF

bgee:
  name: Bgee Expression Data
  extract: false
  url: https://www.bgee.org/ftp/current/download/calls/expr_calls/Mus_musculus_expr_simple_all_conditions.tsv.gz

coxpressdb:
  name: Coxpress DB
  version: {strategy: url_regex, pattern: '\.(v[\d-]+)\.', vtype: other}
  extract: true
  url: https://zenodo.org/record/6861444/files/Mmu-r.v22-05.G17008-S214753.combat_pca.subagging.z.d.zip

# enhancer_atlas:
#   name: EnhancerAtlas
#   url: http://www.enhanceratlas.org/data/download/enhancer_atlas_2.0/7227_all_tissues.bed   
    
epd:
  name: Eukaryotic Promoter Database
  compress: gzip
  url:
    # - https://epd.epfl.ch/EPD/get_promoter_seq?db=hg38&format=bed&nb_seq=0  # this is not working
    # - https://epd.expasy.org/ftp/epdnew/D_melanogaster/current/ 
    - https://epd.expasy.org/ftp/epdnew/M_musculus/current/Mm_EPDnew.bed
gaf:
  name: GO Annotation File (GAF) from MGI
  extract: false
  url: https://current.geneontology.org/annotations/mgi.gaf.gz

gencode:
  name: GENCODE Release M38 (GRCm39)
  version: {strategy: url_regex, pattern: 'gencode\.(vM\d+)\.', vtype: sequential}
  source_url: https://www.gencodegenes.org/
  extract: false
  url:
    - https://ftp.ebi.ac.uk/pub/databases/gencode/Gencode_mouse/release_M38/gencode.vM38.chr_patch_hapl_scaff.annotation.gtf.gz
    - https://ftp.ncbi.nlm.nih.gov/gene/DATA/GENE_INFO/Mammalia/Mus_musculus.gene_info.gz

reactome:
  name: Reactome
  url:
    - https://reactome.org/download/current/ReactomePathways.txt
    - https://reactome.org/download/current/ReactomePathwaysRelation.txt
    - https://reactome.org/download/current/Ensembl2Reactome_All_Levels.txt
    - https://reactome.org/download/current/Ensembl2ReactomeReactions.txt
    - https://reactome.org/download/current/ReactionPMIDS.txt
    - https://reactome.org/download/current/ChEBI2Reactome_All_Levels.txt
    - https://reactome.org/download/current/ChEBI2ReactomeReactions.txt
    - https://reactome.org/download/current/interactors/reactome.all_species.interactions.tab-delimited.txt


rna_central:
  name: RNA Central
  extract: false
  url:
    bed: https://ftp.ebi.ac.uk/pub/databases/RNAcentral/current_release/genome_coordinates/bed/mus_musculus.GRCm39.bed.gz
    rfam: https://ftp.ebi.ac.uk/pub/databases/RNAcentral/current_release/rfam/rfam_annotations.tsv.gz

string:
  name: STRING PPI
  version: {strategy: url_regex, pattern: 'protein\.links\.(?:detailed\.)?(v[\d.]+)', vtype: semver}
  extract: false
  url:
    - https://stringdb-downloads.org/download/protein.links.v12.0/10090.protein.links.v12.0.txt.gz
    - https://stringdb-downloads.org/download/protein.links.detailed.v12.0/10090.protein.links.detailed.v12.0.txt.gz

tflink:
  name: TFLink
  version: {strategy: url_regex, pattern: '_(v[\d.]+)\.tsv', vtype: semver}
  extract: false
  url: https://cdn.netbiol.org/tflink/download_files/TFLink_Mus_musculus_interactions_All_simpleFormat_v1.0.tsv.gz

uniprot:
  name: UniProtKB/Swiss-Prot
  extract: false
  url: https://ftp.uniprot.org/pub/databases/uniprot/current_release/knowledgebase/taxonomic_divisions/uniprot_sprot_rodents.dat.gz
  

